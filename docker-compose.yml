services:
  mysql:
    image: mysql:8.0.31
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_ROOT_HOST: "%"
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/01-agentsims-init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot"]
      interval: 5s
      timeout: 3s
      retries: 30

  server:
    build: .
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      AGENTSIMS_DB_HOST: mysql
      AGENTSIMS_DB_PORT: 3306
      AGENTSIMS_DB_USER: root
      AGENTSIMS_DB_PASSWORD: ""
      AGENTSIMS_WAIT_FOR_DB: "1"
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
      - ./snapshot:/app/snapshot
      - ./config/api_key.json:/app/config/api_key.json:ro
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.create_connection(('127.0.0.1',8000), 3); s.close()\""]
      interval: 10s
      timeout: 5s
      retries: 12

  client:
    image: nginx:1.25-alpine
    depends_on:
      - server
    ports:
      - "8081:80"
    volumes:
      - ./client:/usr/share/nginx/html:ro

volumes:
  mysql-data:
